name: Crear App VapeHouse
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Crear el Ejecutable (.exe)
      # Nota: Asegúrate de que tu archivo se llame main.py
      run: pyinstaller --noconsole --onefile --name "VapeHouse_App" main.py
      
    - name: Subir el archivo final
      uses: actions/upload-artifact@v4
      with:
        name: VapeHouse-Ejecutable
        path: dist/VapeHouse_App.exe
